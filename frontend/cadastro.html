<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENTRAR - BURGER MASTER</title>
    <link rel="stylesheet" href="css/cadastro.css">
</head>
<body>
    <main class="hero-section">
        <div class="login-container-dark">
            
            <header class="login-header">
                <div class="brand">BURGER<span>.BD</span></div>
                <div class="nav-actions">
                    <div class="user-profile"><i class="fas fa-user"></i></div>
                </div>
            </header>

            <div class="login-content">
                <h2>Acesse sua conta</h2>
                <p>Para saborear o melhor <strong>HAMBÚRGUER</strong> da região</p>

                <form>
                    <div class="input-box">
                        <input type="text" placeholder="Seu e-mail ou usuário" required>
                    </div>
                    <div class="input-box">
                        <input type="password" placeholder="Sua senha" required>
                    </div>
                    
                    <button type="submit" class="btn-login">ENTRAR AGORA</button>
                </form>
                <div class="footer-links">
                <a href="registrar.html" class="highlight">Não possui uma conta? Registrar-se</a>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
