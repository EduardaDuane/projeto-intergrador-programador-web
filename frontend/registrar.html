<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENTRAR - BURGER MASTER</title>
    <link rel="stylesheet" href="css/cadastro.css">
</head>
<body>
    <main class="hero-section">
        <div class="login-container-dark">
            
            <header class="login-header">
                <div class="brand">BURGER<span>.BD</span></div>
                <div class="nav-actions">
                    <div class="user-profile"><i class="fas fa-user"></i></div>
                </div>
            </header>

            <div class="login-content">
                <h2><CADASTRE-SE></CADASTRE-SE></h2>
                <p>Para saborear o melhor <strong>HAMBÚRGUER</strong> da região</p>

                <form action="index.html" method="GET">
    <div class="input-box">
        <label>NOME COMPLETO:</label>
        <input type="text" name="Digite o seu Nome Completo" required>
    </div>

    <div class="input-box">
        <label>E-MAIL:</label>
        <input type="email" placeholder="Digite o seu E-mail" required>
    </div>
    <div class="input-box">
        <label>SENHA:</label>
        <input type="password" placeholder="Crie uma senha" required>
    </div>

    <div class="input-box">
        <label>CONFIRME SUA SENHA:</label>
        <input type="password" placeholder="Confirme sua senha" required>
    </div>
    
    <button type="submit" class="btn-login">CADASTRO FINALIZADO</button>
</form>
                <div class="footer-links">
                </div>
            </div>
        </div>
    </main>
</body>
</html>
